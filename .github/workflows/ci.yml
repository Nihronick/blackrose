name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: тесты ─────────────────────────────────────────────
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest --tb=short -q

  # ── Backend: линтер ────────────────────────────────────────────
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

  # ── Bot: линтер ────────────────────────────────────────────────
  bot-lint:
    name: Bot lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Lint
        run: ruff check .

  # ── Frontend: сборка ───────────────────────────────────────────
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.railway.app

  # ── Итоговый gate — Railway деплоит только после этого job'а ──
  # В Railway: Settings → Deploy Triggers → Run checks before deploy
  all-checks:
    name: All checks passed
    needs: [backend-test, backend-lint, bot-lint, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All CI checks passed"
