[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes (unused imports, undefined names)
    "I",   # isort (import ordering)
    "B",   # flake8-bugbear (common bugs)
    "UP",  # pyupgrade (modern Python syntax)
]
ignore = [
    "E501",  # line too long — ruff format handles это
    "B008",  # do not perform function calls in default args (FastAPI Depends)
    "B904",  # raise ... from err — в некоторых местах не нужно
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401"]  # unused imports в тестах — stub-модули

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
